version: 2

project_name: btptf

before:
  hooks:
    # this is just an example and not a requirement for provider building/publishing
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    binary: "btptf_v{{ .Version }}"
archives:
  - formats: ["binary"]
    name_template: "btptf_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

msi:
- wxs: install.wxs
  replace: true
  mod_timestamp: "{{ .CommitTimestamp }}"
  version: v4
  
